<!doctype html><html><head><meta charset="utf-8"><title>Argus</title>
<style>
 body{font-family:-apple-system,Helvetica,Arial,sans-serif;margin:0;background:#0f0f14;color:#e7e7ee}
 header{padding:28px 32px;border-bottom:1px solid #23232e}
 h1{margin:0;font-size:22px;color:#a78bfa}
 .sub{color:#9a9aae;font-size:13px;margin-top:4px}
 .total{padding:26px 32px}
 .total .big{font-size:40px;font-weight:700;color:#f87171}
 .total .cap{color:#9a9aae;font-size:13px}
 .cards{padding:0 32px 40px;display:grid;gap:14px;max-width:760px}
 .card{background:#17171f;border:1px solid #262633;border-radius:12px;padding:16px 18px}
 .badge{display:inline-block;font-size:11px;font-weight:600;color:#0f0f14;background:#a78bfa;border-radius:999px;padding:2px 10px}
 .amt{float:right;font-size:20px;font-weight:700;color:#f87171}
 .row{margin-top:10px;font-size:13px;color:#c9c9d6}
 .src{color:#8b8b9e}
 .note{margin-top:8px;font-size:12px;color:#9a9aae;font-style:italic}
</style></head><body>
<header><h1>◎ Argus</h1><div class="sub">Spend &amp; contract leakage auditor — finds where your invoices, POs and contracts disagree. Built on Crosscheck.</div></header>
<div class="total"><div class="cap">Leakage found</div><div class="big" id="total">…</div><div class="cap" id="count"></div></div>
<div class="cards" id="cards"></div>
<script>
 const fmt=n=>'$'+Number(n).toLocaleString();
 fetch('/leakage').then(r=>r.json()).then(d=>{
   document.getElementById('total').textContent=fmt(d.total_at_risk);
   document.getElementById('count').textContent=d.findings.length+' issues across your documents';
   document.getElementById('cards').innerHTML=d.findings.map(f=>`
     <div class="card">
       <span class="amt">${f.amount!=null?fmt(f.amount):'review'}</span>
       <span class="badge">${f.category}</span>
       <div class="row">${f.entity}</div>
       <div class="row"><span class="src">${f.source_a} (${f.time_a}):</span> ${f.claim_a}</div>
       <div class="row"><span class="src">${f.source_b} (${f.time_b}):</span> ${f.claim_b}</div>
       <div class="note">${f.note}</div>
     </div>`).join('');
 });
</script></body></html>
